name: Local Dub LLM

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: "YouTube video / playlist / CHANNEL link, or Google Drive / direct URL"
        required: true
      src:
        description: "Source language"
        default: "Hindi"
        required: true
      target:
        description: "Target language"
        default: "English"
        required: true
      genre:
        description: "Genre (monologue, podcast, ott_movie_sequence, advertisement, edtech, academic_lecture_formal)"
        default: "monologue"
        required: true
      speakers:
        description: "Number of speakers"
        default: "1"
        required: true
      turbo:
        description: "Turbo mode (~300 pieces, all in parallel)"
        type: boolean
        default: false
      limit:
        description: "Max videos to take from a channel/playlist (0 = all)"
        default: "0"
        required: false

jobs:
  dub:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg + helpers
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python -m pip install --upgrade pip
          pip install requests gdown yt-dlp

      - name: Fetch + dub (video / playlist / channel)
        env:
          DUB_BASE_URL: ${{ secrets.DUB_BASE_URL }}
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          mkdir -p output
          URL="${{ github.event.inputs.video_url }}"
          FLAGS=""
          if [ "${{ github.event.inputs.turbo }}" = "true" ]; then FLAGS="--turbo"; fi
          LIM="${{ github.event.inputs.limit }}"; [ -z "$LIM" ] && LIM=0
          COOK=""
          if [ -n "$YT_COOKIES" ]; then printf '%s' "$YT_COOKIES" > cookies.txt; COOK="--cookies cookies.txt"; fi
          if echo "$URL" | grep -qi "drive.google"; then
            # Google Drive single file -> download then dub directly
            gdown --fuzzy "$URL" -O input.mp4
            python dub_video.py "$GITHUB_WORKSPACE/input.mp4" \
              --src "${{ github.event.inputs.src }}" --target "${{ github.event.inputs.target }}" \
              --genre "${{ github.event.inputs.genre }}" --speakers "${{ github.event.inputs.speakers }}" \
              --dir "$GITHUB_WORKSPACE/output" $FLAGS
          else
            # YouTube video / playlist / channel (or any direct URL) via yt-dlp
            python fetch_and_dub.py "$URL" \
              --src "${{ github.event.inputs.src }}" --target "${{ github.event.inputs.target }}" \
              --genre "${{ github.event.inputs.genre }}" --speakers "${{ github.event.inputs.speakers }}" \
              --dir "$GITHUB_WORKSPACE/output" --limit "$LIM" $FLAGS $COOK
          fi

      - name: Upload result to Google Drive
        if: success()
        env:
          RCLONE_CONF: ${{ secrets.RCLONE_CONF }}
          DRIVE_FOLDER: ${{ secrets.DRIVE_FOLDER }}
        run: |
          if [ -z "$RCLONE_CONF" ]; then
            echo "No RCLONE_CONF secret set - skipping Drive upload (file still in Artifacts)."
            exit 0
          fi
          curl -fsSL https://rclone.org/install.sh | sudo bash
          mkdir -p ~/.config/rclone
          printf '%s' "$RCLONE_CONF" > ~/.config/rclone/rclone.conf
          DEST="gdrive:${DRIVE_FOLDER:-LocalDub}"
          echo "Uploading dubbed file to $DEST ..."
          rclone copy output/ "$DEST" --transfers 1 --drive-chunk-size 64M -v
          echo "Done -> your Google Drive folder: ${DRIVE_FOLDER:-LocalDub}"

      - name: Backup copy in Artifacts (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dubbed-video
          path: output/**
          retention-days: 30
          if-no-files-found: warn
